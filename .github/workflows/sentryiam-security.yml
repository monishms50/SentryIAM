name: SentryIAM — Security Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # ── Stage 1: Secret scanning ─────────────────────────────────────────────────
  gitleaks:
    name: "[1] Gitleaks"
    uses: monishms50/devsecops-hub/.github/workflows/gitleaks.yml@main
    secrets: inherit

  # ── Stage 2: SAST — runs in parallel after gitleaks passes ──────────────────
  bandit:
    name: "[2] Bandit"
    needs: gitleaks
    uses: monishms50/devsecops-hub/.github/workflows/bandit.yml@main
    with:
      scan_path: "."
      severity: "medium"
      confidence: "medium"
    secrets: inherit

  semgrep:
    name: "[2] Semgrep"
    needs: gitleaks
    uses: monishms50/devsecops-hub/.github/workflows/semgrep.yml@main
    with:
      config: "p/python p/owasp-top-ten"
      scan_path: "."
    secrets: inherit

  # ── Stage 3: SCA ─────────────────────────────────────────────────────────────
  sca:
    name: "[3] SCA"
    needs: [bandit, semgrep]
    uses: monishms50/devsecops-hub/.github/workflows/sca.yml@main
    with:
      requirements_file: "requirements.txt"
    secrets: inherit

