name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:            # adds manual run button in GitHub UI

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — SAST with Bandit
  # ─────────────────────────────────────────
  bandit-scan:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write    # needed to upload SARIF to Security tab
      actions: read
      contents: read

    steps:

      # Step 1 — Check out your code onto the machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Install Bandit
      - name: Install Bandit
        run: pip install bandit[sarif]

      # Step 5 — Run Bandit and output SARIF report
      - name: Run Bandit Scan
        run: |
          bandit -r app/ \
            -f sarif \
            -o bandit-report.sarif \
            --severity-level medium
        continue-on-error: false   # remove this in later phases

      # Step 6 — Upload SARIF to GitHub Security tab
      - name: Upload Bandit SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-report.sarif
          category: bandit-sast

      # Step 7 — Save report as downloadable artifact
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.sarif
          retention-days: 30

         
  # ─────────────────────────────────────────
  # JOB 2 — Secret Scanning with Gitleaks
  # ─────────────────────────────────────────
  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ─────────────────────────────────────────
  # JOB 3 — Dependency Scanning with pip-audit
  # ─────────────────────────────────────────
  pip-audit-scan:
    name: pip-audit Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt -f json -o pip-audit-report.json --desc on || true
          test -f pip-audit-report.json || echo '{"dependencies":[]}' > pip-audit-report.json
        continue-on-error: false

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30
          if-no-files-found: warn
          
          
          
  # ─────────────────────────────────────────
  # JOB 4 — Container Scanning with Trivy
  # ─────────────────────────────────────────
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [bandit-scan, pip-audit-scan]
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devsecops-app:latest .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:latest
          format: sarif
          output: trivy-report.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: false

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif
          category: trivy-container

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.sarif
          retention-days: 30
          if-no-files-found: warn

